services:
  blogapi:
    image: api-blog-comments:staging
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      Jwt__Key: ${JWT_KEY:-}
      Documentation__Enabled: ${DOCUMENTATION_ENABLED:-true}
      Documentation__RoutePrefix: ${DOCUMENTATION_ROUTE_PREFIX:-docs}
      Cors__AllowedOriginsCsv: ${CORS_ALLOWED_ORIGINS_CSV}
      DataProtection__KeysPath: /var/app/data-protection-keys
      HttpPipeline__UseHttpsRedirection: false
      HttpPipeline__UseForwardedHeaders: true
    volumes:
      - data-protection-keys:/var/app/data-protection-keys

volumes:
  data-protection-keys:
