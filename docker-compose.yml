services:
  blogapi:
    image: api-blog-comments:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY:-}
      - DataProtection__KeysPath=/var/app/data-protection-keys
      - HttpPipeline__UseHttpsRedirection=false
      - HttpPipeline__UseForwardedHeaders=true
    volumes:
      - data-protection-keys:/var/app/data-protection-keys

volumes:
  data-protection-keys:
